<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin — Fiad Shop</title>
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { cta: { 50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        *:focus-visible { outline: 2px solid #f97316; outline-offset: 2px; border-radius: 4px; }
        /* Subtle background pattern to differentiate admin from customer pages */
        .bg-grid {
            background-image:
              linear-gradient(rgba(249,115,22,.04) 1px, transparent 1px),
              linear-gradient(90deg, rgba(249,115,22,.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .dark .bg-grid {
            background-image:
              linear-gradient(rgba(249,115,22,.08) 1px, transparent 1px),
              linear-gradient(90deg, rgba(249,115,22,.08) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-white dark:bg-black text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen bg-grid flex flex-col">

    <!-- Minimal header (no navbar for security) -->
    <div class="container mx-auto px-4 py-5 flex justify-between items-center">
        <a href="index.html" class="text-xl font-bold tracking-tight">
            <span class="text-cta-500 dark:text-cta-400">FIAD</span>
            <span class="text-gray-900 dark:text-white">SHOP</span>
        </a>
        <button id="dark-mode-toggle" class="p-2 rounded-full bg-gray-100 dark:bg-zinc-800 text-gray-600 dark:text-cta-400 hover:scale-105 transition" aria-label="Toggle theme">
            <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
        </button>
    </div>

    <main class="flex-1 flex items-center justify-center px-4 py-10">
        <div class="w-full max-w-sm">
            <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-2xl shadow-xl p-7">
                <div class="w-14 h-14 rounded-2xl bg-cta-500 text-white mx-auto mb-4 flex items-center justify-center shadow-lg shadow-cta-500/30">
                    <i class="fa-solid fa-shield-halved text-2xl"></i>
                </div>
                <h1 class="text-lg font-bold text-center mb-1">Admin Sign-in</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400 text-center mb-6">Authorised personnel only.</p>

                <form id="admin-login-form" class="space-y-3" novalidate>
                    <div>
                        <label class="text-xs font-medium mb-1 block text-gray-700 dark:text-gray-300">Email</label>
                        <input id="al-email" type="email" required placeholder="admin@fiad.shop"
                            class="w-full px-3 py-2.5 border border-gray-300 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-900 text-sm focus:ring-2 focus:ring-cta-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-medium mb-1 block text-gray-700 dark:text-gray-300">Password</label>
                        <input id="al-password" type="password" required placeholder="••••••••"
                            class="w-full px-3 py-2.5 border border-gray-300 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-900 text-sm focus:ring-2 focus:ring-cta-500 outline-none">
                    </div>
                    <div id="al-2fa-wrap" class="hidden">
                        <label class="text-xs font-medium mb-1 block text-gray-700 dark:text-gray-300">2FA code</label>
                        <input id="al-2fa" type="text" inputmode="numeric" maxlength="6" placeholder="123456"
                            class="w-full px-3 py-2.5 border border-gray-300 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-900 text-sm text-center tracking-widest font-mono focus:ring-2 focus:ring-cta-500 outline-none">
                    </div>
                    <button id="al-submit" type="submit"
                        class="w-full py-3 bg-cta-500 hover:bg-cta-600 text-white rounded-lg text-sm font-bold transition shadow-lg shadow-cta-500/30">
                        <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i>Sign in
                    </button>
                </form>

                <p class="text-[11px] text-gray-400 dark:text-gray-500 text-center mt-5">
                    <i class="fa-solid fa-lock mr-1"></i>All access attempts are logged.
                </p>
            </div>
            <p class="text-center mt-4 text-[10px] text-gray-400 dark:text-gray-500">
                <a href="index.html" class="hover:text-cta-500 transition"><i class="fa-solid fa-arrow-left mr-1"></i>Back to store</a>
            </p>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/support-chat.js"></script>

    <script>
    (function () {
        const { api, toast } = window.FiadAPI;

        // If already an admin, jump straight in.
        document.addEventListener('DOMContentLoaded', () => {
            if (window.FiadAuth.isAdmin()) {
                location.href = 'admin-panel.html';
            }
        });

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('al-email').value.trim();
            const password = document.getElementById('al-password').value;
            const twoFactorCode = document.getElementById('al-2fa').value.trim() || undefined;
            if (!email || !password) return toast('Enter email and password', 'warn');
            const btn = document.getElementById('al-submit');
            const orig = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Signing in…';
            try {
                const res = await window.FiadAuth.login(email, password, twoFactorCode);
                if (res.requires2FA) {
                    document.getElementById('al-2fa-wrap').classList.remove('hidden');
                    document.getElementById('al-2fa').focus();
                    toast('Enter your 2FA code', 'info');
                    btn.disabled = false; btn.innerHTML = orig;
                    return;
                }
                await window.FiadAuth.refreshMe();
                if (!window.FiadAuth.isAdmin()) {
                    window.FiadAuth.logout();  // sign the non-admin back out
                    btn.disabled = false; btn.innerHTML = orig;
                    return toast('This account is not an admin.', 'error');
                }
                toast('Welcome, admin.', 'success');
                setTimeout(() => location.href = 'admin-panel.html', 500);
            } catch (err) {
                btn.disabled = false; btn.innerHTML = orig;
                toast(err.message || 'Sign-in failed', 'error');
            }
        });
    })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Panel — Fiad Shop</title>
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '480px' },
                    colors: { cta: { 50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        *:focus-visible { outline: 2px solid #f97316; outline-offset: 2px; border-radius: 4px; }

        .sidebar-link {
            display: flex; align-items: center; gap: .75rem;
            padding: .625rem .875rem; border-radius: .5rem;
            font-size: .8125rem; font-weight: 500;
            color: #4b5563; transition: all .15s ease;
        }
        .dark .sidebar-link { color: #a1a1aa; }
        .sidebar-link:hover { background: #fff7ed; color: #ea580c; }
        .dark .sidebar-link:hover { background: rgba(249,115,22,.1); color: #fb923c; }
        .sidebar-link.active {
            background: #f97316; color: #fff; box-shadow: 0 4px 12px rgba(249,115,22,.3);
        }
        .sidebar-link.active:hover { background: #ea580c; color: #fff; }

        .admin-card { border: 1px solid #e5e7eb; }
        .dark .admin-card { border-color: #27272a; }

        .modal-backdrop { animation: fadeIn .18s ease-out; }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

        /* Slide-out for mobile sidebar */
        #sidebar { transition: transform .25s ease; }
        @media (max-width: 767px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 60; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }

        table.data { width: 100%; font-size: 12px; border-collapse: collapse; }
        table.data th { text-align: left; padding: .5rem .75rem; font-weight: 600; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
        table.data td { padding: .625rem .75rem; border-bottom: 1px solid #f3f4f6; }
        .dark table.data th { color: #9ca3af; border-color: #27272a; }
        .dark table.data td { border-color: #18181b; }
        table.data tr:hover td { background: #fff7ed; }
        .dark table.data tr:hover td { background: rgba(249,115,22,.05); }

        .status-pill { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: 700; }
        .status-PENDING   { background:#fef3c7; color:#92400e; }
        .status-PAID      { background:#dbeafe; color:#1e40af; }
        .status-APPROVED  { background:#e0e7ff; color:#3730a3; }
        .status-SHIPPED   { background:#dcfce7; color:#166534; }
        .status-DELIVERED { background:#d1fae5; color:#065f46; }
        .status-REJECTED,.status-CANCELLED { background:#fee2e2; color:#991b1b; }
        .status-REFUNDED  { background:#f3e8ff; color:#6b21a8; }
        .dark .status-PENDING   { background:rgba(146,64,14,.25); color:#fcd34d; }
        .dark .status-PAID      { background:rgba(30,64,175,.25); color:#93c5fd; }
        .dark .status-APPROVED  { background:rgba(55,48,163,.25); color:#a5b4fc; }
        .dark .status-SHIPPED   { background:rgba(22,101,52,.25); color:#86efac; }
        .dark .status-DELIVERED { background:rgba(6,95,70,.3); color:#6ee7b7; }
        .dark .status-REJECTED,.dark .status-CANCELLED { background:rgba(153,27,27,.25); color:#fca5a5; }
        .dark .status-REFUNDED  { background:rgba(107,33,168,.25); color:#d8b4fe; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-black text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen">

    <!-- Gate: not-admin state -->
    <div id="gate-loading" class="py-24 text-center text-gray-500">
        <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
        <p class="text-sm">Checking access…</p>
    </div>
    <div id="gate-denied" class="hidden py-20 text-center">
        <i class="fa-solid fa-shield-halved text-red-500 text-4xl mb-3"></i>
        <h2 class="font-bold text-lg mb-2">Access denied</h2>
        <p class="text-xs text-gray-500 mb-4">This area is restricted to administrators.</p>
        <a href="admin-login.html" class="inline-block bg-cta-500 hover:bg-cta-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold">Go to Admin Sign-in</a>
    </div>

    <!-- APP SHELL -->
    <div id="shell" class="hidden flex min-h-screen">

        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-white dark:bg-zinc-950 border-r border-gray-200 dark:border-zinc-800 flex flex-col md:sticky md:top-0 md:h-screen">
            <div class="px-5 py-5 border-b border-gray-100 dark:border-zinc-900">
                <a href="index.html" class="text-xl font-bold tracking-tight">
                    <span class="text-cta-500 dark:text-cta-400">FIAD</span>
                    <span class="text-gray-900 dark:text-white">SHOP</span>
                </a>
                <p class="text-[10px] font-bold uppercase tracking-widest text-cta-500 mt-1">Admin</p>
            </div>
            <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                <a class="sidebar-link" data-section="dashboard"       href="#dashboard"><i class="fa-solid fa-chart-line w-4 text-center"></i>Dashboard</a>
                <a class="sidebar-link" data-section="products"        href="#products"><i class="fa-solid fa-box w-4 text-center"></i>Products</a>
                <a class="sidebar-link" data-section="orders"          href="#orders"><i class="fa-solid fa-cart-shopping w-4 text-center"></i>Orders</a>
                <a class="sidebar-link" data-section="affiliates"      href="#affiliates"><i class="fa-solid fa-user-group w-4 text-center"></i>Affiliates</a>
                <a class="sidebar-link" data-section="feedback"        href="#feedback"><i class="fa-solid fa-comment-dots w-4 text-center"></i>Feedback</a>
                <a class="sidebar-link" data-section="ai-knowledge"    href="#ai-knowledge"><i class="fa-solid fa-robot w-4 text-center"></i>AI Knowledge</a>
                <a class="sidebar-link" data-section="email-providers" href="#email-providers"><i class="fa-solid fa-envelope w-4 text-center"></i>Email Providers</a>
                <a class="sidebar-link" data-section="support-settings" href="#support-settings"><i class="fa-solid fa-toggle-on w-4 text-center"></i>Support Settings</a>
                <a class="sidebar-link" data-section="live-support"    href="#live-support"><i class="fa-solid fa-headset w-4 text-center"></i>Live Support</a>
                <a class="sidebar-link" data-section="homepage"        href="#homepage"><i class="fa-solid fa-house-chimney w-4 text-center"></i>Homepage</a>
                <a class="sidebar-link" data-section="users"           href="#users"><i class="fa-solid fa-users-cog w-4 text-center"></i>Users</a>
            </nav>
            <div class="px-3 py-4 border-t border-gray-100 dark:border-zinc-900">
                <button id="logout-btn" class="sidebar-link w-full text-left text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30">
                    <i class="fa-solid fa-arrow-right-from-bracket w-4 text-center"></i>Logout
                </button>
            </div>
        </aside>

        <!-- Main -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="sticky top-0 z-40 bg-white/95 dark:bg-black/95 backdrop-blur-sm border-b border-gray-200 dark:border-zinc-800 px-4 py-3 flex items-center gap-3">
                <button id="mobile-sidebar-toggle" class="md:hidden p-2 rounded-full bg-gray-100 dark:bg-zinc-800" aria-label="Toggle sidebar">
                    <i class="fa-solid fa-bars text-sm"></i>
                </button>
                <h1 id="section-title" class="text-base sm:text-lg font-bold">Dashboard</h1>
                <div class="ml-auto flex items-center gap-2">
                    <button id="dark-mode-toggle" class="p-2 rounded-full bg-gray-100 dark:bg-zinc-800 text-gray-600 dark:text-cta-400 hover:scale-105 transition" aria-label="Toggle theme">
                        <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
                    </button>
                    <span id="admin-name" class="hidden sm:inline text-xs text-gray-500"></span>
                </div>
            </header>

            <div id="section-root" class="flex-1 p-4 md:p-6"></div>
        </div>
    </div>

    <!-- Modal root (used by every section) -->
    <div id="modal-root"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/support-chat.js"></script>

    <!-- ==== ADMIN LOGIC (kept in one file for atomicity, split into IIFE modules) ==== -->
    <script>
    (function () {
        const { api, toast, escapeHtml } = window.FiadAPI;

        // ===== GATE =====
        (async function gate() {
            await window.FiadAuth.refreshMe();
            if (!window.FiadAuth.isAdmin()) {
                document.getElementById('gate-loading').classList.add('hidden');
                document.getElementById('gate-denied').classList.remove('hidden');
                return;
            }
            document.getElementById('gate-loading').classList.add('hidden');
            document.getElementById('shell').classList.remove('hidden');
            document.getElementById('shell').style.display = 'flex';
            document.getElementById('admin-name').textContent = 'Hi, ' + (window.FiadAuth.getUser()?.displayName || 'admin');
            initRouter();
        })();

        document.getElementById('logout-btn').addEventListener('click', () => window.FiadAuth.logout());
        document.getElementById('mobile-sidebar-toggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

        // ===== SECTION ROUTER =====
        const sections = {}; // name -> render(rootEl)

        function initRouter() {
            document.querySelectorAll('.sidebar-link[data-section]').forEach(a => {
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    navigate(a.getAttribute('data-section'));
                    document.getElementById('sidebar').classList.remove('open');
                });
            });
            window.addEventListener('hashchange', () => {
                const s = location.hash.replace(/^#/, '') || 'dashboard';
                navigate(s);
            });
            navigate((location.hash.replace(/^#/, '')) || 'dashboard');
        }

        function navigate(name) {
            if (!sections[name]) name = 'dashboard';
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.getAttribute('data-section') === name));
            document.getElementById('section-title').textContent =
                ({dashboard:'Dashboard', products:'Products', orders:'Orders', affiliates:'Affiliates', feedback:'Feedback',
                  'ai-knowledge':'AI Knowledge', 'email-providers':'Email Providers', 'support-settings':'Support Settings',
                  'live-support':'Live Support', homepage:'Homepage Products', users:'Users'})[name] || name;
            if (location.hash !== '#' + name) location.hash = '#' + name;
            const root = document.getElementById('section-root');
            root.innerHTML = '<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl"></i></div>';
            try { sections[name](root); }
            catch (e) { root.innerHTML = '<p class="text-red-500 text-sm">' + escapeHtml(e.message) + '</p>'; }
        }

        // ===== MODAL HELPER =====
        function openModal(html, opts = {}) {
            const backdrop = document.createElement('div');
            backdrop.className = 'modal-backdrop fixed inset-0 z-[95] bg-black/50 flex items-center justify-center p-4 overflow-y-auto';
            backdrop.innerHTML = `<div class="admin-card bg-white dark:bg-zinc-900 rounded-xl w-full ${opts.width || 'max-w-lg'} my-8 max-h-[90vh] overflow-y-auto">${html}</div>`;
            document.getElementById('modal-root').appendChild(backdrop);
            const close = () => backdrop.remove();
            backdrop.addEventListener('click', (e) => { if (e.target === backdrop && opts.closeOnBackdrop !== false) close(); });
            backdrop.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', close));
            return { el: backdrop, close };
        }
        function money(n) { return '$' + Number(n || 0).toFixed(2); }
        function fmt(d) { return d ? new Date(d).toLocaleString() : '—'; }

        // ============================================================================
        // DASHBOARD
        // ============================================================================
        sections.dashboard = async (root) => {
            const { counts, revenue, recentOrders } = await api.get('/admin/dashboard');
            const stat = (label, val, icon, color) => `
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl p-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-${color}-100 dark:bg-${color}-900/30 text-${color}-600 dark:text-${color}-400 flex items-center justify-center">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <div>
                            <p class="text-[10px] uppercase tracking-widest text-gray-500">${label}</p>
                            <p class="text-xl font-bold">${val}</p>
                        </div>
                    </div>
                </div>`;
            root.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
                    ${stat('Orders',         counts.orders,          'fa-cart-shopping', 'cta')}
                    ${stat('Revenue',        money(revenue),         'fa-dollar-sign',   'green')}
                    ${stat('Users',          counts.users,           'fa-users',         'blue')}
                    ${stat('Affiliates',     counts.affiliates,      'fa-user-group',    'purple')}
                    ${stat('Feedback',       counts.pendingFeedback, 'fa-comment-dots',  'yellow')}
                    ${stat('Live Sessions',  counts.activeSessions,  'fa-headset',       'red')}
                </div>
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl p-5">
                    <h3 class="text-sm font-bold mb-3">Recent orders</h3>
                    <table class="data">
                        <thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>
                        ${recentOrders.map(o => `
                            <tr>
                                <td class="font-semibold"><a class="text-cta-500 hover:underline" href="#orders" data-jump-order="${escapeHtml(o.id)}">${escapeHtml(o.orderNumber)}</a></td>
                                <td class="text-gray-500">${escapeHtml(o.guestEmail || 'Registered user')}</td>
                                <td class="font-bold">${money(o.total)}</td>
                                <td><span class="status-pill status-${o.status}">${o.status}</span></td>
                                <td class="text-gray-500">${fmt(o.createdAt)}</td>
                            </tr>`).join('') || '<tr><td colspan="5" class="text-center text-gray-400 py-6">No orders yet.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;
        };

        // ============================================================================
        // PRODUCTS
        // ============================================================================
        sections.products = async (root) => {
            const { items } = await api.get('/admin/products');
            root.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <p class="text-sm text-gray-500">${items.length} products</p>
                    <button id="new-product" class="bg-cta-500 hover:bg-cta-600 text-white text-sm font-bold px-4 py-2 rounded-lg"><i class="fa-solid fa-plus mr-1"></i>New product</button>
                </div>
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl overflow-hidden">
                    <table class="data">
                        <thead><tr><th>Product</th><th>SKU</th><th>Category</th><th>Price</th><th>Commission</th><th>Status</th><th></th></tr></thead>
                        <tbody>
                        ${items.map(p => `
                            <tr>
                                <td>
                                    <div class="flex items-center gap-2">
                                        <img src="${(p.images && p.images[0]) || 'https://placehold.co/60'}" class="w-9 h-9 rounded object-cover">
                                        <div class="min-w-0">
                                            <div class="font-semibold truncate">${escapeHtml(p.name)}</div>
                                            <div class="text-[10px] text-gray-500">${p.isProMode ? '<span class="text-cta-500">Pro Mode</span> · ' : ''}${p.isPackage ? 'Package · ' : ''}${(p.variants || []).length} variants</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="font-mono text-[11px]">${escapeHtml(p.sku)}</td>
                                <td>${escapeHtml(p.category)}</td>
                                <td class="font-bold">${money(p.basePrice)}</td>
                                <td>${Number(p.affiliateCommission || 0)}%</td>
                                <td>${p.isActive ? '<span class="text-green-600 text-xs font-bold">Active</span>' : '<span class="text-gray-400 text-xs">Inactive</span>'}</td>
                                <td class="text-right whitespace-nowrap">
                                    <button data-edit="${p.id}" class="text-cta-500 hover:text-cta-600 px-2"><i class="fa-solid fa-pen"></i></button>
                                    <button data-del="${p.id}" class="text-red-500 hover:text-red-600 px-2"><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>`).join('') || '<tr><td colspan="7" class="text-center text-gray-400 py-6">No products yet.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;

            document.getElementById('new-product').addEventListener('click', () => productModal(null));
            root.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => {
                const p = items.find(i => i.id === b.getAttribute('data-edit'));
                productModal(p);
            }));
            root.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
                if (!confirm('Delete this product? This cannot be undone.')) return;
                try { await api.del('/admin/products/' + b.getAttribute('data-del')); toast('Deleted', 'success'); sections.products(root); }
                catch (e) { toast(e.message, 'error'); }
            }));
        };

        function productModal(p) {
            const isEdit = !!p;
            const { close } = openModal(`
                <div class="p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-lg">${isEdit ? 'Edit product' : 'New product'}</h3>
                        <button data-close class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div><label class="text-xs font-medium mb-1 block">SKU *</label><input id="p-sku" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700" value="${escapeHtml(p?.sku || '')}"></div>
                        <div><label class="text-xs font-medium mb-1 block">CJ PID *</label><input id="p-pid" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700" value="${escapeHtml(p?.pid || '')}"></div>
                        <div class="col-span-2"><label class="text-xs font-medium mb-1 block">Name *</label><input id="p-name" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700" value="${escapeHtml(p?.name || '')}"></div>
                        <div class="col-span-2"><label class="text-xs font-medium mb-1 block">Description *</label><textarea id="p-desc" rows="3" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700">${escapeHtml(p?.description || '')}</textarea></div>
                        <div><label class="text-xs font-medium mb-1 block">Category *</label><input id="p-cat" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700" value="${escapeHtml(p?.category || '')}"></div>
                        <div><label class="text-xs font-medium mb-1 block">Base price ($) *</label><input id="p-price" type="number" step="0.01" min="0" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700" value="${p?.basePrice || 0}"></div>
                        <div><label class="text-xs font-medium mb-1 block">Affiliate commission (%)</label><input id="p-comm" type="number" step="0.5" min="0" max="90" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700" value="${p?.affiliateCommission || 0}"></div>
                        <div><label class="text-xs font-medium mb-1 block">Stock</label><input id="p-stock" type="number" min="0" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700" value="${p?.stock || 0}"></div>
                        <div class="col-span-2"><label class="text-xs font-medium mb-1 block">Image URLs (one per line) *</label><textarea id="p-imgs" rows="3" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700">${escapeHtml((p?.images || []).join('\n'))}</textarea></div>
                        <div class="col-span-2 flex gap-4">
                            <label class="text-xs flex items-center gap-2"><input id="p-active" type="checkbox" ${p?.isActive !== false ? 'checked' : ''} class="accent-cta-500"> Active</label>
                            <label class="text-xs flex items-center gap-2"><input id="p-pro" type="checkbox" ${p?.isProMode ? 'checked' : ''} class="accent-cta-500"> Pro Mode</label>
                            <label class="text-xs flex items-center gap-2"><input id="p-pkg" type="checkbox" ${p?.isPackage ? 'checked' : ''} class="accent-cta-500"> Is Package</label>
                        </div>
                        <div class="col-span-2">
                            <label class="text-xs font-medium mb-1 block">Variants (JSON array, optional)</label>
                            <textarea id="p-var" rows="3" placeholder='[{"color":"Black","size":"M","stock":10}]' class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 font-mono text-[11px]">${escapeHtml(JSON.stringify(p?.variants || [], null, 2))}</textarea>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-5">
                        <button data-close class="flex-1 py-2.5 border border-gray-300 dark:border-zinc-700 rounded-lg text-sm">Cancel</button>
                        <button id="p-save" class="flex-1 py-2.5 bg-cta-500 hover:bg-cta-600 text-white rounded-lg text-sm font-bold">${isEdit ? 'Save changes' : 'Create product'}</button>
                    </div>
                </div>`, { width: 'max-w-2xl' });

            document.getElementById('p-save').addEventListener('click', async () => {
                let variants;
                try { variants = JSON.parse(document.getElementById('p-var').value || '[]'); }
                catch { return toast('Variants JSON is invalid', 'error'); }
                const body = {
                    sku: document.getElementById('p-sku').value.trim(),
                    pid: document.getElementById('p-pid').value.trim(),
                    name: document.getElementById('p-name').value.trim(),
                    description: document.getElementById('p-desc').value.trim(),
                    category: document.getElementById('p-cat').value.trim(),
                    basePrice: Number(document.getElementById('p-price').value),
                    images: document.getElementById('p-imgs').value.split('\n').map(s => s.trim()).filter(Boolean),
                    affiliateCommission: Number(document.getElementById('p-comm').value || 0),
                    stock: Number(document.getElementById('p-stock').value || 0),
                    isActive:  document.getElementById('p-active').checked,
                    isProMode: document.getElementById('p-pro').checked,
                    isPackage: document.getElementById('p-pkg').checked,
                    variants,
                };
                try {
                    if (isEdit) await api.put('/admin/products/' + p.id, body);
                    else        await api.post('/admin/products', body);
                    toast(isEdit ? 'Product updated' : 'Product created', 'success');
                    close();
                    sections.products(document.getElementById('section-root'));

                        <h3 class="font-bold text-lg">${isEdit ? 'Edit' : 'New'} knowledge entry</h3>
                        <button data-close class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="space-y-3">
                        <div><label class="text-xs font-medium mb-1 block">Category *</label><input id="k-cat" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml(k?.category || 'general')}" placeholder="shipping, returns, products, payment, general"></div>
                        <div><label class="text-xs font-medium mb-1 block">Question *</label><input id="k-q" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml(k?.question || '')}"></div>
                        <div><label class="text-xs font-medium mb-1 block">Answer *</label><textarea id="k-a" rows="4" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm">${escapeHtml(k?.answer || '')}</textarea></div>
                        <div><label class="text-xs font-medium mb-1 block">Keywords (comma-separated)</label><input id="k-kw" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml((k?.keywords || []).join(', '))}" placeholder="shipping, delivery, when"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="text-xs flex items-center gap-2"><input id="k-active" type="checkbox" ${k?.isActive !== false ? 'checked' : ''} class="accent-cta-500"> Active</label>
                            <div><label class="text-xs font-medium mb-1 block">Priority</label><input id="k-pr" type="number" min="0" max="100" value="${k?.priority || 0}" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm"></div>
                        </div>
                        <button id="k-save" class="w-full py-2.5 bg-cta-500 hover:bg-cta-600 text-white rounded-lg text-sm font-bold">${isEdit ? 'Save' : 'Create'}</button>
                    </div>
                </div>`);
            el.querySelector('#k-save').addEventListener('click', async () => {
                const body = {
                    category: el.querySelector('#k-cat').value.trim(),
                    question: el.querySelector('#k-q').value.trim(),
                    answer:   el.querySelector('#k-a').value.trim(),
                    keywords: el.querySelector('#k-kw').value.split(',').map(s => s.trim()).filter(Boolean),
                    isActive: el.querySelector('#k-active').checked,
                    priority: Number(el.querySelector('#k-pr').value || 0),
                };
                try {
                    if (isEdit) await api.put('/admin/ai-knowledge/' + k.id, body);
                    else        await api.post('/admin/ai-knowledge', body);
                    toast('Saved', 'success'); close();
                    sections['ai-knowledge'](document.getElementById('section-root'));
                } catch (e) { toast(e.message, 'error'); }
            });
        }

        // ============================================================================
        // EMAIL PROVIDERS
        // ============================================================================
        sections['email-providers'] = async (root) => {
            const { items } = await api.get('/admin/email-providers');
            root.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <p class="text-sm text-gray-500">${items.length} providers · lower priority = tried first</p>
                        <p class="text-[11px] text-gray-400">Env-based Brevo & Sendpulse are used as fallbacks after these.</p>
                    </div>
                    <button id="ep-new" class="bg-cta-500 hover:bg-cta-600 text-white text-sm font-bold px-4 py-2 rounded-lg"><i class="fa-solid fa-plus mr-1"></i>Add provider</button>
                </div>
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl overflow-hidden">
                    <table class="data">
                        <thead><tr><th>Priority</th><th>Name</th><th>Kind</th><th>From</th><th>Status</th><th></th></tr></thead>
                        <tbody>${items.map(p => `
                            <tr>
                                <td class="font-mono">${p.priority}</td>
                                <td class="font-semibold">${escapeHtml(p.name)}</td>
                                <td>${escapeHtml(p.kind)}</td>
                                <td class="text-[11px] text-gray-500">${escapeHtml(p.fromName)} &lt;${escapeHtml(p.fromEmail)}&gt;</td>
                                <td>${p.isActive ? '<span class="text-green-600 text-xs font-bold">Active</span>' : '<span class="text-gray-400 text-xs">Inactive</span>'}</td>
                                <td class="text-right whitespace-nowrap">
                                    <button data-edit-e="${p.id}" class="text-cta-500 px-2"><i class="fa-solid fa-pen"></i></button>
                                    <button data-del-e="${p.id}"  class="text-red-500 px-2"><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>`).join('') || '<tr><td colspan="6" class="text-center text-gray-400 py-6">No custom providers configured.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;
            document.getElementById('ep-new').addEventListener('click', () => epModal(null));
            root.querySelectorAll('[data-edit-e]').forEach(b => b.addEventListener('click', () => epModal(items.find(x => x.id === b.getAttribute('data-edit-e')))));
            root.querySelectorAll('[data-del-e]').forEach(b => b.addEventListener('click', async () => {
                if (!confirm('Delete this provider?')) return;
                try { await api.del('/admin/email-providers/' + b.getAttribute('data-del-e')); toast('Deleted', 'success'); sections['email-providers'](root); }
                catch (e) { toast(e.message, 'error'); }
            }));
        };

        function epModal(p) {
            const isEdit = !!p;
            const { close, el } = openModal(`
                <div class="p-6">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-lg">${isEdit ? 'Edit' : 'Add'} email provider</h3>
                        <button data-close class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-xs font-medium mb-1 block">Name *</label><input id="e-name" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml(p?.name || '')}"></div>
                        <div><label class="text-xs font-medium mb-1 block">Kind *</label>
                            <select id="e-kind" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm">
                                ${['BREVO','SENDPULSE','SMTP'].map(k => `<option ${k===(p?.kind||'BREVO')?'selected':''}>${k}</option>`).join('')}
                            </select>
                        </div>
                        <div><label class="text-xs font-medium mb-1 block">Priority (lower = higher)</label><input id="e-pr" type="number" min="0" value="${p?.priority ?? 50}" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm"></div>
                        <div><label class="text-xs font-medium mb-1 block">Active</label>
                            <select id="e-act" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm">
                                <option value="true" ${p?.isActive !== false ? 'selected' : ''}>Yes</option>
                                <option value="false" ${p?.isActive === false ? 'selected' : ''}>No</option>
                            </select>
                        </div>
                        <div><label class="text-xs font-medium mb-1 block">From name</label><input id="e-fn" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml(p?.fromName || 'Fiad Shop')}"></div>
                        <div><label class="text-xs font-medium mb-1 block">From email</label><input id="e-fe" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml(p?.fromEmail || 'support@fiad.shop')}"></div>
                        <div class="col-span-2 border-t border-gray-100 dark:border-zinc-800 pt-3"></div>
                        <div class="col-span-2"><label class="text-xs font-medium mb-1 block">API key (BREVO / SENDPULSE)</label><input id="e-ak" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm font-mono" placeholder="${isEdit ? '(unchanged if left blank)' : ''}"></div>
                        <div class="col-span-2"><label class="text-xs font-medium mb-1 block">API secret (SENDPULSE only)</label><input id="e-as" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm font-mono" placeholder="${isEdit ? '(unchanged if left blank)' : ''}"></div>
                        <div class="col-span-2 border-t border-gray-100 dark:border-zinc-800 pt-3"></div>
                        <div><label class="text-xs font-medium mb-1 block">SMTP host</label><input id="e-h" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml(p?.host || '')}"></div>
                        <div><label class="text-xs font-medium mb-1 block">SMTP port</label><input id="e-p" type="number" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${p?.port || 587}"></div>
                        <div><label class="text-xs font-medium mb-1 block">SMTP user</label><input id="e-u" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm" value="${escapeHtml(p?.authUser || '')}"></div>
                        <div><label class="text-xs font-medium mb-1 block">SMTP password</label><input id="e-pw" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm font-mono" placeholder="${isEdit ? '(unchanged if left blank)' : ''}"></div>
                    </div>
                    <button id="e-save" class="w-full mt-4 py-2.5 bg-cta-500 hover:bg-cta-600 text-white rounded-lg text-sm font-bold">${isEdit ? 'Save' : 'Add provider'}</button>
                </div>`, { width: 'max-w-2xl' });

            el.querySelector('#e-save').addEventListener('click', async () => {
                const body = {
                    name: el.querySelector('#e-name').value.trim(),
                    kind: el.querySelector('#e-kind').value,
                    priority: Number(el.querySelector('#e-pr').value),
                    isActive: el.querySelector('#e-act').value === 'true',
                    fromName:  el.querySelector('#e-fn').value.trim(),
                    fromEmail: el.querySelector('#e-fe').value.trim(),
                    apiKey:    el.querySelector('#e-ak').value.trim() || undefined,
                    apiSecret: el.querySelector('#e-as').value.trim() || undefined,
                    host:      el.querySelector('#e-h').value.trim() || undefined,
                    port:      Number(el.querySelector('#e-p').value) || undefined,
                    authUser:  el.querySelector('#e-u').value.trim() || undefined,
                    authPass:  el.querySelector('#e-pw').value.trim() || undefined,
                };
                try {
                    if (isEdit) await api.put('/admin/email-providers/' + p.id, body);
                    else        await api.post('/admin/email-providers', body);
                    toast('Saved', 'success'); close();
                    sections['email-providers'](document.getElementById('section-root'));
                } catch (e) { toast(e.message, 'error'); }
            });
        }

        // ============================================================================
        // SUPPORT SETTINGS
        // ============================================================================
        sections['support-settings'] = async (root) => {
            const { settings } = await api.get('/admin/support-settings');
            root.innerHTML = `
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl p-6 max-w-xl">
                    <h3 class="text-sm font-bold mb-3">Live support</h3>
                    <label class="flex items-center gap-3 cursor-pointer p-3 rounded-lg bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800">
                        <input id="ss-live" type="checkbox" ${settings.isLiveEnabled ? 'checked' : ''} class="w-5 h-5 accent-cta-500">
                        <div>
                            <p class="text-sm font-semibold">Enable live chat</p>
                            <p class="text-xs text-gray-500">When ON, visitors see a "Live Support" button. When OFF, they see "Leave a message" instead.</p>
                        </div>
                    </label>
                    <div class="mt-4">
                        <label class="text-xs font-medium mb-1 block">Offline message</label>
                        <textarea id="ss-off" rows="3" class="w-full px-3 py-2 border rounded bg-transparent border-gray-300 dark:border-zinc-700 text-sm">${escapeHtml(settings.offlineMessage || '')}</textarea>
                    </div>
                    <button id="ss-save" class="w-full mt-4 py-2.5 bg-cta-500 hover:bg-cta-600 text-white rounded-lg text-sm font-bold">Save settings</button>
                </div>`;
            document.getElementById('ss-save').addEventListener('click', async () => {
                try {
                    await api.put('/admin/support-settings', {
                        isLiveEnabled: document.getElementById('ss-live').checked,
                        offlineMessage: document.getElementById('ss-off').value.trim(),
                    });
                    toast('Saved', 'success');
                } catch (e) { toast(e.message, 'error'); }
            });
        };

        // ============================================================================
        // LIVE SUPPORT (sessions list + basic reply)
        // ============================================================================
        sections['live-support'] = async (root) => {
            const { sessions } = await api.get('/support/admin/sessions?status=ALL');
            root.innerHTML = `
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl overflow-hidden">
                    <table class="data">
                        <thead><tr><th>Email</th><th>Status</th><th>Messages</th><th>Started</th><th>Last activity</th><th></th></tr></thead>
                        <tbody>${sessions.map(s => `
                            <tr>
                                <td class="font-semibold">${escapeHtml(s.email)}</td>
                                <td>${s.status}</td>
                                <td>${(s.messages || []).length}</td>
                                <td class="text-[11px] text-gray-500">${fmt(s.createdAt)}</td>
                                <td class="text-[11px] text-gray-500">${fmt(s.updatedAt)}</td>
                                <td class="text-right whitespace-nowrap">
                                    <button data-view-s="${s.id}" class="text-cta-500 text-xs font-semibold px-2">View</button>
                                    ${s.status !== 'CLOSED' ? `<button data-join-s="${s.id}" class="text-green-600 text-xs font-semibold px-2">Join</button>
                                    <button data-close-s="${s.id}" class="text-red-500 text-xs font-semibold px-2">Close</button>` : ''}
                                </td>
                            </tr>`).join('') || '<tr><td colspan="6" class="text-center text-gray-400 py-6">No sessions.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;
            // Open the real-time chat view (falls back to modal if module missing)
            root.querySelectorAll('[data-view-s]').forEach(b => b.addEventListener('click', async () => {
                const sess = sessions.find(x => x.id === b.getAttribute('data-view-s'));
                if (window.FiadSupportChat?.openAdmin) {
                    await window.FiadSupportChat.openAdmin({ sessionId: sess.id, container: root });
                } else {
                    sessionModal(sess);
                }
            }));
            root.querySelectorAll('[data-join-s]').forEach(b => b.addEventListener('click', async () => {
                try { await api.post('/support/admin/session/' + b.getAttribute('data-join-s') + '/join', {}); toast('Joined session', 'success'); sections['live-support'](root); }
                catch (e) { toast(e.message, 'error'); }
            }));
            root.querySelectorAll('[data-close-s]').forEach(b => b.addEventListener('click', async () => {
                if (!confirm('Close this session?')) return;
                try { await api.post('/support/admin/session/' + b.getAttribute('data-close-s') + '/close', {}); toast('Closed', 'success'); sections['live-support'](root); }
                catch (e) { toast(e.message, 'error'); }
            }));
        };

        function sessionModal(s) {
            const messages = Array.isArray(s.messages) ? s.messages : [];
            const { close, el } = openModal(`
                <div class="p-6">
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <h3 class="font-bold text-lg">Session — ${escapeHtml(s.email)}</h3>
                            <p class="text-xs text-gray-500">${s.status} · started ${fmt(s.createdAt)}</p>
                        </div>
                        <button data-close class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="max-h-72 overflow-y-auto space-y-2 bg-gray-50 dark:bg-zinc-950 rounded-lg p-3 mb-3 border border-gray-100 dark:border-zinc-800">
                        ${messages.length ? messages.map(m => `
                            <div class="flex ${m.sender === 'admin' ? 'justify-end' : 'justify-start'}">
                                <div class="max-w-[80%] px-3 py-2 rounded-lg text-xs ${m.sender === 'admin' ? 'bg-cta-500 text-white' : m.sender === 'system' ? 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-300' : 'bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700'}">
                                    <div>${escapeHtml(m.message)}</div>
                                    <div class="text-[9px] opacity-70 mt-0.5">${fmt(m.timestamp)}</div>
                                </div>
                            </div>`).join('') : '<p class="text-center text-xs text-gray-400 py-6">No messages yet.</p>'}
                    </div>
                    <div class="flex gap-2">
                        <input id="s-msg" placeholder="Type a reply…" class="flex-1 px-3 py-2 border rounded-lg bg-transparent border-gray-300 dark:border-zinc-700 text-sm">
                        <button id="s-send" class="bg-cta-500 hover:bg-cta-600 text-white font-bold px-4 rounded-lg text-sm"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>`, { width: 'max-w-xl' });

            el.querySelector('#s-send').addEventListener('click', async () => {
                const message = el.querySelector('#s-msg').value.trim();
                if (!message) return;
                try {
                    await api.post('/support/session/' + s.id + '/message', { sender: 'admin', message });
                    toast('Sent', 'success'); close();
                    sections['live-support'](document.getElementById('section-root'));
                } catch (e) { toast(e.message, 'error'); }
            });
        }

        // ============================================================================
        // HOMEPAGE FEATURED PRODUCTS
        // ============================================================================
        sections.homepage = async (root) => {
            const [{ ids }, { items }] = await Promise.all([
                api.get('/admin/settings/homepage'),
                api.get('/admin/products'),
            ]);
            const chosen = new Set(ids);
            root.innerHTML = `
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl p-5 max-w-4xl">
                    <h3 class="text-sm font-bold mb-1">Featured products on homepage</h3>
                    <p class="text-xs text-gray-500 mb-4">Selected products appear on the homepage in the order shown below.</p>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    ${items.map(p => `
                        <label class="cursor-pointer border-2 ${chosen.has(p.id) ? 'border-cta-500' : 'border-gray-200 dark:border-zinc-700'} rounded-lg p-2 hover:border-cta-500 transition">
                            <input type="checkbox" class="hp-cb hidden" value="${p.id}" ${chosen.has(p.id) ? 'checked' : ''}>
                            <img src="${(p.images && p.images[0]) || 'https://placehold.co/300'}" class="w-full aspect-square object-cover rounded mb-2">
                            <p class="text-xs font-semibold truncate">${escapeHtml(p.name)}</p>
                            <p class="text-[10px] text-gray-500">${money(p.basePrice)}</p>
                        </label>`).join('')}
                    </div>
                    <button id="hp-save" class="mt-4 w-full py-2.5 bg-cta-500 hover:bg-cta-600 text-white rounded-lg text-sm font-bold">Save selection</button>
                </div>`;
            document.getElementById('hp-save').addEventListener('click', async () => {
                const selected = Array.from(root.querySelectorAll('.hp-cb:checked')).map(c => c.value);
                try { await api.put('/admin/settings/homepage', { ids: selected }); toast('Homepage updated', 'success'); }
                catch (e) { toast(e.message, 'error'); }
            });
        };

        // ============================================================================
        // USERS
        // ============================================================================
        sections.users = async (root) => {
            const { items } = await api.get('/admin/users');
            root.innerHTML = `
                <div class="admin-card bg-white dark:bg-zinc-900 rounded-xl overflow-hidden">
                    <table class="data">
                        <thead><tr><th>User</th><th>Email</th><th>Role</th><th>2FA</th><th>Verified</th><th>Joined</th><th></th></tr></thead>
                        <tbody>${items.map(u => `
                            <tr>
                                <td class="font-semibold">${escapeHtml(u.displayName)} <span class="text-[10px] text-gray-500">@${escapeHtml(u.username)}</span></td>
                                <td>${escapeHtml(u.email)}</td>
                                <td>
                                    <select data-role-user="${u.id}" class="text-[11px] px-2 py-1 border rounded bg-transparent border-gray-300 dark:border-zinc-700">
                                        ${['USER','AFFILIATE','MODERATOR','ADMIN'].map(r => `<option ${r===u.role?'selected':''}>${r}</option>`).join('')}
                                    </select>
                                </td>
                                <td>${u.twoFactorEnabled ? '<i class="fa-solid fa-check text-green-500"></i>' : '<i class="fa-solid fa-xmark text-gray-400"></i>'}</td>
                                <td>${u.isVerified ? '<i class="fa-solid fa-check text-green-500"></i>' : '<i class="fa-solid fa-xmark text-red-500"></i>'}</td>
                                <td class="text-[11px] text-gray-500">${fmt(u.createdAt)}</td>
                                <td></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
            root.querySelectorAll('[data-role-user]').forEach(sel => sel.addEventListener('change', async () => {
                try { await api.put('/admin/users/' + sel.getAttribute('data-role-user') + '/role', { role: sel.value }); toast('Role updated', 'success'); }
                catch (e) { toast(e.message, 'error'); }
            }));
        };

        // ============================================================================
        // ADMIN-WIDE REAL-TIME: new-session pings
        // Subscribes to the admin-notify Ably channel so any admin watching the panel
        // gets a toast + auto-refresh whenever a customer opens a new chat session.
        // ============================================================================
        (function initAdminRealtime() {
            if (!window.FiadSupportChat?.subscribeAdminNotify) return;
            window.FiadSupportChat.subscribeAdminNotify({
                onNewSession: ({ sessionId, email }) => {
                    toast('New support session from ' + (email || 'a visitor'), 'info', 6000);
                    // If admin is currently viewing the live-support list, refresh it.
                    const active = document.querySelector('.sidebar-link.active')?.getAttribute('data-section');
                    if (active === 'live-support') {
                        sections['live-support'](document.getElementById('section-root'));
                    }
                    // Play a soft ping (data URI, no external file needed)
                    try {
                        const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=');
                        audio.volume = 0.3; audio.play().catch(() => {});
                    } catch {}
                },
            }).catch(() => {});
        })();
    })();
    </script>
</body>
</html>
